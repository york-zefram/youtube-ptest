<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-BUDDY NEST PLAYER</title>
    <style>
        :root {
            --blue: #00f3ff;
            --black: #000000;
            --gray: #111111;
            --dark-gray: #8b8b8b;

            --bg: #000000;
            --panel: #050505;
            --line: #1f1f1f;
            --line-strong: #333333;
            --text: #f2f2f2;
            --muted: #8b8b8b;
            --accent: #00f3ff;
            --control-bg: #111111;
        }

        body.light-mode {
            --blue: #40a9ea;
            --black: #f3f5f7;
            --gray: #e6e9ed;
            --dark-gray: #8f959c;

            --bg: #f3f5f7;
            --panel: #f3f5f7;
            --line: #d8dde3;
            --line-strong: #c4cbd3;
            --text: #333333;
            --muted: #8f959c;
            --accent: #40a9ea;
            --control-bg: #e6e9ed;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; background: var(--black); color: var(--text); font-family: sans-serif; overflow: hidden; }
        button, input { font-family: inherit; }

        .main-container { width: 100%; height: 100vh; position: relative; overflow: hidden; background: var(--black); }
        .player-layout { display: grid; grid-template-columns: minmax(0, 1.35fr) minmax(0, 0.85fr); width: 100%; height: 100%; min-width: 0; min-height: 0; overflow: hidden; background: var(--black); }
        .left-player-column { display: grid; grid-template-rows: minmax(0, 1fr) 82px; min-width: 0; min-height: 0; overflow: hidden; background: #000000; border-right: 1px solid var(--line, #1f1f1f); }
        .right-genre-column { display: grid; grid-template-rows: 74px 96px 88px minmax(0, 1fr); width: 100%; max-width: 100%; min-width: 0; min-height: 0; overflow: hidden; background: var(--black); box-sizing: border-box; }

        .panel-section { min-width: 0; min-height: 0; overflow: hidden; border-bottom: 1px solid var(--line); box-sizing: border-box; }
        .panel-title { height: 22px; display: flex; align-items: center; justify-content: center; color: var(--dark-gray); font-size: 0.55rem; font-weight: bold; letter-spacing: 0.18em; text-transform: uppercase; line-height: 22px; user-select: none; }

        /* CONTENT TYPE */
        .content-type-panel { display: grid; grid-template-rows: 22px minmax(0, 1fr); align-items: center; padding: 7px 14px 10px; }
        .content-type-switch {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 34px;
            width: 100%;
            min-width: 0;
        }

        .content-type-btn {
            width: 46px;
            min-width: 46px;
            height: 42px;
            padding: 0;
            border: none;
            background: transparent;
            color: var(--dark-gray);
            border-radius: 0;
            box-shadow: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.25s ease;
        }

        .content-type-btn.active,
        .content-type-btn:hover {
            color: var(--blue);
            border: none;
            background: transparent;
            box-shadow: none;
        }

        .content-type-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            flex: 0 0 32px;
        }

        .content-type-icon svg {
            width: 32px;
            height: 32px;
            display: block;
        }

        .content-type-btn[data-youtube-type="music"] .content-type-icon,
        .content-type-btn[data-youtube-type="music"] .content-type-icon svg {
            width: 38px;
            height: 38px;
            flex-basis: 38px;
        }

        @media (max-width: 560px) {
            .content-type-switch {
                gap: 28px;
            }

            .content-type-btn {
                width: 42px;
                min-width: 42px;
                height: 38px;
            }

            .content-type-icon,
            .content-type-icon svg {
                width: 28px;
                height: 28px;
                flex-basis: 28px;
            }

            .content-type-btn[data-youtube-type="music"] .content-type-icon,
            .content-type-btn[data-youtube-type="music"] .content-type-icon svg {
                width: 34px;
                height: 34px;
                flex-basis: 34px;
            }
        }

        /* GENRE */
        .genre-panel { display: grid; grid-template-rows: 22px minmax(0, 1fr); align-items: center; padding: 8px 0 10px; }
        .rotary-container {
            width: 100%;
            max-width: 100%;
            min-width: 0;
            height: 34px;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            scrollbar-width: none;
            -ms-overflow-style: none;
            cursor: grab;
        }
        .rotary-container::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
            background: transparent;
        }
        .rotary-container.dragging {
            cursor: grabbing;
            scroll-snap-type: none;
            scroll-behavior: auto;
        }
        .rotary-container.dragging .mode-btn {
            pointer-events: none;
            user-select: none;
        }
        .rotary-track {
            display: flex;
            align-items: center;
            height: 34px;
            width: max-content;
            min-width: max-content;
            padding-left: calc(50% - 78px);
            padding-right: calc(50% - 78px);
        }
        .mode-btn {
            scroll-snap-align: center;
            flex: 0 0 156px;
            width: 156px;
            height: 28px;
            padding: 0;
            margin: 0 7px;
            background: var(--gray);
            border: 1px solid var(--line-strong);
            border-radius: 999px;
            color: var(--dark-gray);
            font-size: 0.6rem;
            font-weight: bold;
            letter-spacing: 0.06em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            appearance: none;
            -webkit-appearance: none;
            transition:
                color 0.25s ease,
                border-color 0.25s ease,
                background 0.25s ease;
        }
        .mode-btn.active,
        .mode-btn:hover {
            color: var(--blue);
            border-color: var(--blue);
            background: var(--black);
        }

        /* VIDEO */
        #video-container { width: 100%; height: 100%; min-height: 0; background: #000000; flex-shrink: 0; border-bottom: 1px solid var(--line, #1f1f1f); position: relative; overflow: hidden; }
        #player { width: 100%; height: 100%; transform: scale(1.01); background: #000000; }

        /* CONTROLS */
        .player-controls { display: grid; grid-template-columns: 46px minmax(0, 1fr); align-items: center; height: 82px; padding: 0 18px; background: var(--black); gap: 16px; flex-shrink: 0; position: relative; z-index: 10; }
        #play-pause-btn { width: 38px; height: 38px; border: 1px solid var(--line-strong, #333333); border-radius: 50%; background: var(--gray); color: var(--blue); cursor: pointer; user-select: none; display: flex; align-items: center; justify-content: center; font-size: 0.92rem; line-height: 1; text-align: center; box-sizing: border-box; }
        #play-pause-btn:hover { border-color: var(--blue); }
        .seek-container { position: relative; height: 100%; min-width: 0; display: flex; align-items: center; }
        .seek-bar-wrapper { position: relative; width: 100%; height: 7px; background: var(--gray); border-radius: 999px; cursor: pointer; touch-action: none; z-index: 15; overflow: hidden; }
        #seek-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--blue); opacity: 0.55; border-radius: 999px; pointer-events: none; }
        body.light-mode #seek-fill { background: var(--blue); opacity: 0.55; }
        #seek-dot { position: absolute; top: 50%; width: 13px; height: 13px; background: var(--blue); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: none; }
        .time-label { position: absolute; font-family: monospace; font-size: 0.68rem; color: var(--dark-gray); letter-spacing: 0.08em; pointer-events: none; bottom: 12px; }
        body.light-mode .time-label { color: var(--dark-gray); }
        #current-time { left: 0; }
        #total-time { right: 0; }

        /* SEARCH */
        .search-panel { display: grid; grid-template-rows: 22px minmax(0, 1fr); align-items: center; padding: 8px 0 10px; }
        .search-area { padding: 0; background: var(--black); flex-shrink: 0; border-bottom: 1px solid var(--line); display: flex; flex-direction: column; align-items: center; position: relative; z-index: 20; width: 100%; max-width: 100%; min-width: 0; box-sizing: border-box; overflow: hidden; }
        .bottom-row { width: calc(100% - 28px); max-width: calc(100% - 28px); display: flex; gap: 10px; align-items: center; margin-top: 10px; min-width: 0; box-sizing: border-box; }
        #theme-trigger { cursor: pointer; font-size: 1.05rem; transition: 0.3s; color: var(--dark-gray); opacity: 0.7; flex-shrink: 0; width: 24px; text-align: center; }
        #theme-trigger.active { color: var(--blue); opacity: 1; }
        #key-trigger { cursor: pointer; font-size: 1.2rem; transition: 0.3s; color: var(--dark-gray); opacity: 0.6; flex-shrink: 0; }
        #key-trigger.active { color: var(--blue) !important; opacity: 1; text-shadow: 0 0 12px var(--blue); }
        .input-wrapper { flex: 1 1 auto; min-width: 0; position: relative; }
        #search-input { background: var(--gray); border: 1px solid var(--line-strong); border-radius: 4px; font-size: 1rem; color: var(--text); width: 100%; min-width: 0; max-width: 100%; padding: 10px; outline: none; box-sizing: border-box; }
        #search-btn { background: transparent; color: var(--blue); border: 1px solid var(--blue); padding: 0 12px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; cursor: pointer; height: 40px; line-height: 40px; flex-shrink: 0; }
        #status { position: absolute; left: 0; top: 100%; font-size: 0.55rem; color: var(--muted); margin-top: 4px; letter-spacing: 1px; }

        /* RESULT */
        .result-panel { display: grid; grid-template-rows: 30px auto minmax(0, 1fr); min-width: 0; min-height: 0; overflow: hidden; background: var(--black); }
        .result-panel-title { border-bottom: 1px solid var(--line); }
        .fixed-nav-container { width: 100%; max-width: 100%; min-width: 0; height: 45px; flex-shrink: 0; background: var(--black); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid var(--line); box-sizing: border-box; transform: translateZ(0); overflow: hidden; }
        .nav-link { font-size: 0.85rem; font-weight: bold; color: var(--blue); cursor: pointer; letter-spacing: 1px; -webkit-font-smoothing: antialiased; }
        .nav-link:active { opacity: 0.5; }
        #lst { width: 100%; max-width: 100%; min-width: 0; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; z-index: 5; background: var(--black); box-sizing: border-box; }
        .list-inner { width: 100%; max-width: 100%; min-width: 0; padding: 0 15px 50px 15px; box-sizing: border-box; }

        /* COMMON */
        #setup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; justify-content: center; align-items: center; }
        body.light-mode #setup-overlay { background: rgba(243,245,247,0.92); }
        .z-panel { width: 85%; max-width: 360px; padding: 40px 20px; border: 1px solid var(--blue); background: var(--black); text-align: center; }
        .z-btn { background: transparent; color: var(--blue); border: 1px solid var(--blue); padding: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 0.75rem; margin-bottom: 20px; }
        .setup-input { width: 100%; padding: 12px; background: var(--black); border: 1px solid var(--line-strong); color: var(--blue); font-family: monospace; text-align: center; outline: none; box-sizing: border-box; }
        .section-label {
            font-size: 0.6rem;
            color: var(--blue);
            font-weight: bold;
            margin: 14px 0 8px;
            border-left: 2px solid var(--blue);
            padding-left: 8px;
            letter-spacing: 0.18em;
        }

        .row {
            display: grid;
            grid-template-columns: 42px 48px minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            min-height: 58px;
            padding: 7px 0;
            border-bottom: 1px solid var(--line);
            cursor: pointer;
            min-width: 0;
        }

        body.light-mode .row {
            border-bottom-color: var(--line);
        }

        .row:hover .title {
            color: var(--blue);
        }

        .type-tag {
            width: 42px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--control-bg);
            color: var(--muted);
            border-radius: 3px;
            flex-shrink: 0;
            text-align: center;
            font-size: 0.45rem;
            letter-spacing: 0.08em;
        }

        body.light-mode .type-tag {
            background: var(--control-bg);
            color: var(--muted);
        }

        .thumb-box {
            width: 46px;
            height: 46px;
            flex-shrink: 0;
            border-radius: 3px;
            overflow: hidden;
            background: var(--control-bg);
        }

        body.light-mode .thumb-box {
            background: var(--control-bg);
        }

        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .title {
            min-width: 0;
            flex-grow: 1;
            font-size: 0.74rem;
            line-height: 1.35;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text);
        }

        body.light-mode .title {
            color: var(--text);
        }

        .duration {
            color: var(--muted);
            font-family: monospace;
            font-size: 0.66rem;
            margin-left: 0;
            white-space: nowrap;
        }

        body.light-mode .duration {
            color: var(--muted);
        }

        @media (max-width: 980px) {
            .main-container { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
            .player-layout { display: flex; flex-direction: column; height: 100vh; min-height: 0; overflow: hidden; }
            .left-player-column { display: flex; flex-direction: column; border-right: none; border-bottom: 1px solid var(--line); flex: 0 0 auto; min-height: 0; }
            #video-container { width: 100%; aspect-ratio: 16 / 9; height: auto; max-height: 35vh; flex-shrink: 0; }
            .player-controls { height: 82px; flex-shrink: 0; }
            .right-genre-column { display: grid; grid-template-rows: 70px 92px 84px minmax(0, 1fr); flex: 1 1 auto; min-height: 0; overflow: hidden; }
            .content-type-panel { padding: 6px 14px 9px; }
            .genre-panel { padding: 7px 0 9px; }
            .rotary-container { height: 34px; }
            .rotary-track {
                height: 34px;
                padding-left: calc(50% - 75px);
                padding-right: calc(50% - 75px);
            }
            .mode-btn {
                flex-basis: 150px;
                width: 150px;
                height: 28px;
                margin: 0 6px;
                font-size: 0.6rem;
            }
            .search-panel { padding: 7px 0 9px; }
            .fixed-nav-container { flex-shrink: 0; }
            #lst { min-height: 0; overflow-y: auto; }
        }


        @media (max-width: 560px) {
            .player-controls {
                grid-template-columns: 40px minmax(0, 1fr);
                height: 76px;
                padding: 0 12px;
                gap: 12px;
            }

            #play-pause-btn {
                width: 34px;
                height: 34px;
                font-size: 0.84rem;
            }

            .seek-bar-wrapper {
                height: 6px;
            }

            #seek-dot {
                width: 12px;
                height: 12px;
            }

            .time-label {
                bottom: 10px;
                font-size: 0.62rem;
            }

            .rotary-track {
                padding-left: calc(50% - 70px);
                padding-right: calc(50% - 70px);
            }

            .mode-btn {
                flex-basis: 140px;
                width: 140px;
                height: 27px;
                margin: 0 5px;
                font-size: 0.56rem;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="player-layout">
            <div class="left-player-column">
                <div id="video-container"><div id="player"></div></div>

                <div class="player-controls">
                    <div id="play-pause-btn" onclick="togglePlay()">II</div>
                    <div class="seek-container">
                        <div class="seek-bar-wrapper" id="seek-bar">
                            <div id="seek-fill"></div>
                            <div id="seek-dot"></div>
                        </div>
                        <span id="current-time" class="time-label">00:00</span>
                        <span id="total-time" class="time-label">00:00</span>
                    </div>
                </div>
            </div>

            <div class="right-genre-column">
                <div class="content-type-panel panel-section">
                    <div class="panel-title">CONTENT TYPE</div>
                    <div class="content-type-switch">
                        <button
                            id="contentMusicBtn"
                            class="content-type-btn active"
                            type="button"
                            onclick="setContentType('music')"
                            title="Music"
                            aria-label="Music"
                            data-youtube-type="music"
                        >
                            <span class="content-type-icon" aria-hidden="true">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                                    <path
                                        fill="currentColor"
                                        d="M15.55 5.55c.48-.07.85.29.85.77v7.12a2.7 2.7 0 1 1-1.18-2.22V7.55l-4.5.69v5.64a2.7 2.7 0 1 1-1.18-2.22V7.35c0-.43.31-.8.73-.86l5.28-.94Z"
                                    ></path>
                                </svg>
                            </span>
                        </button>

                        <button
                            id="contentVideoBtn"
                            class="content-type-btn"
                            type="button"
                            onclick="setContentType('video')"
                            title="Video"
                            aria-label="Video"
                            data-youtube-type="video"
                        >
                            <span class="content-type-icon" aria-hidden="true">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
                                    <rect
                                        x="3.5"
                                        y="5.5"
                                        width="17"
                                        height="11.5"
                                        rx="2.2"
                                        fill="none"
                                        stroke="currentColor"
                                        stroke-width="1.8"
                                    ></rect>
                                    <path
                                        d="M10 8.65L14.4 11.5 10 14.35V8.65Z"
                                        fill="currentColor"
                                    ></path>
                                    <rect
                                        x="6.2"
                                        y="18.5"
                                        width="11.6"
                                        height="1.9"
                                        rx="0.95"
                                        fill="currentColor"
                                    ></rect>
                                </svg>
                            </span>
                        </button>
                    </div>
                </div>

                <div class="genre-panel panel-section">
                    <div class="panel-title">GENRE</div>
                    <div class="rotary-container" id="rotary">
                        <div class="rotary-track" id="track"></div>
                    </div>
                </div>

                <div class="search-panel panel-section">
                    <div class="panel-title">SEARCH</div>
                    <div class="search-area">
                        <div class="bottom-row">
                            <div id="theme-trigger" onclick="togglePlayerTheme()">☀</div>
                            <div id="key-trigger" onclick="toggleSetup()">🔑</div>
                            <div class="input-wrapper">
                                <input type="text" id="search-input" placeholder="" onkeydown="if(event.key==='Enter') doSearch()">
                                <div id="status"></div>
                            </div>
                            <button id="search-btn" onclick="doSearch()">GO</button>
                        </div>
                    </div>
                </div>

                <div class="result-panel">
                    <div class="panel-title result-panel-title">RESULT</div>
                    <div class="fixed-nav-container" id="fixed-nav" style="display:none;">
                        <div class="nav-link" onclick="restoreLastSearch()">ALBUM / BACK</div>
                        <div class="nav-link" onclick="doSearch(true)">↻ REFRESH</div>
                    </div>
                    <div id="lst">
                        <div class="list-inner" id="list-inner"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="setup-overlay">
        <div class="z-panel">
            <button class="z-btn" onclick="openGoogle()">OPEN TERMINAL</button>
            <input type="text" id="api-key-input" class="setup-input" placeholder="PASTE CORE KEY" oninput="checkKey()">
            <div onclick="toggleSetup()" style="margin-top:30px; font-size:0.6rem; color:#444; cursor:pointer;">[ CLOSE ]</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let API_KEY = localStorage.getItem('ZEFRAM_API_KEY');
        let player, lastResultsHTML = "";
        let timer, isDragging = false;
        let selectedGenres = [];
        let nextPageToken = "";
        let currentQuery = "";
        let currentContentType = 'music';
        let isGenreDragging = false;
        let genrePointerDown = false;
        let genreDragStartX = 0;
        let genreDragStartScrollLeft = 0;
        let genreLastX = 0;
        let genreLastTime = 0;
        let genreVelocity = 0;
        let genreMomentumFrame = null;

        const MUSIC_GENRES = [
            'Latin / Reggaeton',
            'EDM / Dance',
            'Rock / Alternative',
            'Country',
            'Jazz / Smooth Jazz',
            'Jazzy Hip Hop / Chill Out',
            'MUSIC',
            'MIX',
            'Lo-fi Hip Hop / Chillhop',
            'Indie / Bedroom Pop',
            'Hip Hop / Rap',
            'Pop / Modern Pop',
            'R&B / Soul'
        ];

        const VIDEO_GENRES = [
            'OFFICIAL',
            'LIVE',
            'PERFORMANCE',
            'MV / PV',
            'DANCE',
            'PRACTICE',
            'CHOREOGRAPHY'
        ];

        window.addEventListener('DOMContentLoaded', () => {
            applyPlayerTheme(localStorage.getItem('ZEFRAM_PLAYER_THEME') || 'dark');
            updateKeyStatus();
            initSeekBar();
            renderGenreButtons('music');
            initGenreDrag();
            setTimeout(centerActiveGenre, 150);
        });

        function applyPlayerTheme(theme) {
            const nextTheme = theme === 'light' ? 'light' : 'dark';
            document.body.classList.toggle('light-mode', nextTheme === 'light');
            localStorage.setItem('ZEFRAM_PLAYER_THEME', nextTheme);

            const trigger = document.getElementById('theme-trigger');
            if (trigger) {
                trigger.classList.toggle('active', nextTheme === 'light');
                trigger.innerText = nextTheme === 'light' ? '☾' : '☀';
            }
        }

        function togglePlayerTheme() {
            const isLight = document.body.classList.contains('light-mode');
            applyPlayerTheme(isLight ? 'dark' : 'light');
        }

        function centerActiveGenre(targetEl = null) {
            const rotary = document.getElementById('rotary');
            const activeBtn = targetEl || document.querySelector('.mode-btn.active');

            if (!rotary || !activeBtn) return;
            if (rotary.offsetWidth <= 0 || activeBtn.offsetWidth <= 0) return;

            const move = () => {
                const rotaryRect = rotary.getBoundingClientRect();
                const activeRect = activeBtn.getBoundingClientRect();
                const buttonCenter =
                    activeRect.left -
                    rotaryRect.left +
                    rotary.scrollLeft +
                    activeRect.width / 2;

                rotary.scrollLeft = buttonCenter - rotary.clientWidth / 2;
            };

            requestAnimationFrame(move);
            setTimeout(move, 80);
            setTimeout(move, 220);
        }

        function renderGenreButtons(type) {
            const track = document.getElementById('track');
            if (!track) return;

            const genres = type === 'video' ? VIDEO_GENRES : MUSIC_GENRES;
            const defaultGenre = type === 'video' ? 'MV / PV' : 'MUSIC';

            selectedGenres = [];

            track.innerHTML = genres
                .map((genre) => {
                    const isDefault = genre === defaultGenre;
                    const idAttr = isDefault
                        ? type === 'video'
                            ? 'id="m-video"'
                            : 'id="m-music"'
                        : '';

                    return `
                        <div
                            ${idAttr}
                            class="mode-btn${isDefault ? ' active' : ''}"
                            data-val="${genre}"
                            data-default="${isDefault ? 'true' : 'false'}"
                            onclick="toggleGenre(this)"
                        >
                            ${genre}
                        </div>
                    `;
                })
                .join('');

            const input = document.getElementById('search-input');
            if (input) input.value = '';

            setTimeout(centerActiveGenre, 80);
        }

        function setContentType(type) {
            currentContentType = type === 'video' ? 'video' : 'music';

            const musicBtn = document.getElementById('contentMusicBtn');
            const videoBtn = document.getElementById('contentVideoBtn');

            if (musicBtn) musicBtn.classList.toggle('active', currentContentType === 'music');
            if (videoBtn) videoBtn.classList.toggle('active', currentContentType === 'video');

            renderGenreButtons(currentContentType);
        }

        function toggleGenre(el) {
            if (!el || isGenreDragging) return;

            const val = el.getAttribute('data-val');
            const isDefault = el.getAttribute('data-default') === 'true';

            if (isDefault) {
                selectedGenres = [];
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');

                const input = document.getElementById('search-input');
                if (input) input.value = '';

                centerActiveGenre(el);
                return;
            }

            const defaultBtn = document.querySelector('.mode-btn[data-default="true"]');
            if (defaultBtn) defaultBtn.classList.remove('active');

            if (el.classList.contains('active')) {
                el.classList.remove('active');
                selectedGenres = selectedGenres.filter(g => g !== val);
            } else {
                el.classList.add('active');
                selectedGenres.push(val);
            }

            if (selectedGenres.length === 0 && defaultBtn) {
                defaultBtn.classList.add('active');
                centerActiveGenre(defaultBtn);
            } else {
                centerActiveGenre(el);
            }

            const input = document.getElementById('search-input');
            if (input) input.value = selectedGenres.join(' ');
        }

        function updateKeyStatus() {
            const trigger = document.getElementById('key-trigger');
            if (API_KEY && API_KEY.trim().length > 0) trigger.classList.add('active');
            else trigger.classList.remove('active');
        }

        function toggleSetup() {
            const el = document.getElementById('setup-overlay');
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        }

        function openGoogle() { window.open('https://console.cloud.google.com/apis/credentials', 'z_terminal', 'width=700,height=800'); }

        async function checkKey() {
            const val = document.getElementById('api-key-input').value.trim();
            if (val.length < 30) return;
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/videoCategories?part=snippet&regionCode=JP&key=${val}`);
                if (res.ok) {
                    localStorage.setItem('ZEFRAM_API_KEY', val);
                    API_KEY = val;
                    updateKeyStatus();
                    toggleSetup();
                }
            } catch (e) { console.error("Key verification failed"); }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 0, 'rel': 0, 'modestbranding': 1, 'showinfo': 0, 'iv_load_policy': 3, 'disablekb': 1 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                document.getElementById('play-pause-btn').innerText = "II";
                startTimer();
            } else {
                document.getElementById('play-pause-btn').innerText = "▶";
                stopTimer();
            }
        }

        function togglePlay() {
            if (!player || !player.getPlayerState) return;
            const state = player.getPlayerState();
            if (state == YT.PlayerState.PLAYING) player.pauseVideo();
            else player.playVideo();
        }

        function startTimer() { stopTimer(); timer = setInterval(updateUI, 300); }
        function stopTimer() { clearInterval(timer); }

        function updateUI() {
            if (!player || !player.getCurrentTime || isDragging) return;
            const cur = player.getCurrentTime();
            const dur = player.getDuration();
            updateBar(cur / dur);
            document.getElementById('current-time').innerText = formatTime(cur);
            document.getElementById('total-time').innerText = formatTime(dur);
        }

        function updateBar(perc) {
            const p = Math.max(0, Math.min(1, perc)) * 100;
            document.getElementById('seek-fill').style.width = p + "%";
            document.getElementById('seek-dot').style.left = p + "%";
        }

        function initSeekBar() {
            const bar = document.getElementById('seek-bar');
            const handleMove = (e) => {
                if (!isDragging || !player || !player.getDuration) return;
                const rect = bar.getBoundingClientRect();
                const clientX = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
                const pos = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                updateBar(pos);
                document.getElementById('current-time').innerText = formatTime(pos * player.getDuration());
            };
            const handleEnd = (e) => {
                if (!isDragging) return;
                isDragging = false;
                const rect = bar.getBoundingClientRect();
                const clientX = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientX : e.clientX;
                const pos = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                player.seekTo(pos * player.getDuration());
            };
            bar.addEventListener('mousedown', (e) => { isDragging = true; handleMove(e); });
            bar.addEventListener('touchstart', (e) => { isDragging = true; handleMove(e); }, {passive: false});
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', handleMove, {passive: false});
            window.addEventListener('mouseup', handleEnd);
            window.addEventListener('touchend', handleEnd);
        }

        function initGenreDrag() {
            const rotary = document.getElementById('rotary');
            if (!rotary) return;

            const dragSpeed = 1.35;
            const friction = 0.94;
            const minVelocity = 0.05;

            const stopMomentum = () => {
                if (genreMomentumFrame) {
                    cancelAnimationFrame(genreMomentumFrame);
                    genreMomentumFrame = null;
                }
            };

            const startMomentum = () => {
                const step = () => {
                    rotary.scrollLeft -= genreVelocity;
                    genreVelocity *= friction;

                    if (Math.abs(genreVelocity) > minVelocity) {
                        genreMomentumFrame = requestAnimationFrame(step);
                        return;
                    }

                    genreMomentumFrame = null;
                };

                genreMomentumFrame = requestAnimationFrame(step);
            };

            rotary.addEventListener('pointerdown', (event) => {
                genrePointerDown = true;
                isGenreDragging = false;
                genreDragStartX = event.clientX;
                genreLastX = event.clientX;
                genreLastTime = performance.now();
                genreDragStartScrollLeft = rotary.scrollLeft;
                genreVelocity = 0;

                stopMomentum();

                try {
                    rotary.setPointerCapture(event.pointerId);
                } catch (e) {}
            });

            rotary.addEventListener('pointermove', (event) => {
                if (!genrePointerDown) return;

                const now = performance.now();
                const dx = event.clientX - genreDragStartX;
                const frameDx = event.clientX - genreLastX;
                const dt = Math.max(1, now - genreLastTime);

                if (Math.abs(dx) > 4) {
                    isGenreDragging = true;
                    rotary.classList.add('dragging');
                }

                rotary.scrollLeft = genreDragStartScrollLeft - dx * dragSpeed;
                genreVelocity = (frameDx / dt) * 14 * dragSpeed;

                genreLastX = event.clientX;
                genreLastTime = now;
            });

            rotary.addEventListener('pointerup', (event) => {
                if (!genrePointerDown) return;

                genrePointerDown = false;
                rotary.classList.remove('dragging');

                try {
                    rotary.releasePointerCapture(event.pointerId);
                } catch (e) {}

                if (Math.abs(genreVelocity) > minVelocity) {
                    startMomentum();
                }

                setTimeout(() => {
                    isGenreDragging = false;
                }, 140);
            });

            rotary.addEventListener('pointercancel', () => {
                genrePointerDown = false;
                isGenreDragging = false;
                rotary.classList.remove('dragging');
            });

            rotary.addEventListener('click', (event) => {
                if (isGenreDragging) {
                    event.preventDefault();
                    event.stopPropagation();
                }
            }, true);
        }

        async function doSearch(isNext = false) {
            if (!API_KEY) return toggleSetup();

            const q = document.getElementById('search-input').value.trim();

            if (!q && selectedGenres.length === 0) return;

            if (!isNext) {
                nextPageToken = "";
                currentQuery = q;
            }

            document.getElementById('status').innerText = isNext ? "LOADING NEXT..." : "SEARCHING...";

            try {
                const searchQuery = buildYoutubeSearchQuery(currentQuery);

                let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(searchQuery)}&maxResults=50&key=${API_KEY}`;

                if (isNext && nextPageToken) {
                    url += `&pageToken=${nextPageToken}`;
                }

                const res = await fetch(url);
                const data = await res.json();

                nextPageToken = data.nextPageToken || "";

                const videoIds = data.items
                    .filter(i => i.id.kind === 'youtube#video')
                    .map(i => i.id.videoId)
                    .join(',');

                let durationMap = {};

                if (videoIds) {
                    const dRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${videoIds}&key=${API_KEY}`);
                    const dData = await dRes.json();
                    dData.items.forEach(i => {
                        durationMap[i.id] = parseDuration(i.contentDetails.duration);
                    });
                }

                renderList(data.items, durationMap);
                document.getElementById('status').innerText = "";
            } catch (e) {
                document.getElementById('status').innerText = "ERROR";
            }
        }

        function renderList(items, durationMap) {
            const inner = document.getElementById('list-inner');
            const nav = document.getElementById('fixed-nav');
            let html = "";

            nav.style.display = 'flex';

            const playlists = items.filter(i => i.id.kind === 'youtube#playlist');
            const playlistTag = currentContentType === 'video' ? 'LIST' : 'ALBUM';

            if (playlists.length > 0) {
                html += '<div class="section-label">ALBUMS</div>';
                html += playlists.map(i => `<div class="row" onclick="loadAlbum('${i.id.playlistId}', '${i.snippet.title.replace(/'/g, "&#39;")}')"><span class="type-tag">${playlistTag}</span><div class="thumb-box"><img src="${i.snippet.thumbnails.default.url}"></div><div class="title">${i.snippet.title.replace(/ - Topic$/, "")}</div><div class="duration">--:--</div></div>`).join('');
            }

            const videos = items.filter(i => i.id.kind === 'youtube#video');
            const videoTag = currentContentType === 'video' ? 'VIDEO' : 'SONG';

            if (videos.length > 0) {
                html += '<div class="section-label">VIDEOS</div>';
                html += videos.map(i => `<div class="row" onclick="playVideo('${i.id.videoId}')"><span class="type-tag">${videoTag}</span><div class="thumb-box"><img src="${i.snippet.thumbnails.default.url}"></div><div class="title">${i.snippet.title.replace(/ - Topic$/, "")}</div><div class="duration">${durationMap[i.id.videoId] || "--:--"}</div></div>`).join('');
            }

            inner.innerHTML = html;
            lastResultsHTML = html;
            document.getElementById('lst').scrollTop = 0;
        }

        async function loadAlbum(playlistId, title) {
            document.getElementById('status').innerText = "LOADING...";

            const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();

            const videoIds = data.items.map(i => i.snippet.resourceId.videoId).join(',');
            const dRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${videoIds}&key=${API_KEY}`);
            const dData = await dRes.json();

            let durationMap = {};
            dData.items.forEach(i => {
                durationMap[i.id] = parseDuration(i.contentDetails.duration);
            });

            let html = `<div class="section-label">${title.replace(/ - Topic$/, "")}</div>`;
            const albumItemTag = currentContentType === 'video' ? 'VIDEO' : 'SONG';

            html += data.items.map(i => `<div class="row" onclick="playVideo('${i.snippet.resourceId.videoId}')"><span class="type-tag">${albumItemTag}</span><div class="thumb-box"><img src="${i.snippet.thumbnails.default.url}"></div><div class="title">${i.snippet.title}</div><div class="duration">${durationMap[i.snippet.resourceId.videoId] || "--:--"}</div></div>`).join('');

            document.getElementById('list-inner').innerHTML = html;
            document.getElementById('status').innerText = "";
            document.getElementById('lst').scrollTop = 0;
        }

        function parseDuration(pt) {
            const m = pt.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            if (!m) return "--:--";
            const h = m[1] ? parseInt(m[1]) : 0, min = m[2] ? parseInt(m[2]) : 0, sec = m[3] ? parseInt(m[3]) : 0;
            const res = [];
            if (h > 0) res.push(h);
            res.push(h > 0 ? min.toString().padStart(2, '0') : min);
            res.push(sec.toString().padStart(2, '0'));
            return res.join(':');
        }

        function restoreLastSearch() {
            if(lastResultsHTML) {
                document.getElementById('list-inner').innerHTML = lastResultsHTML;
                document.getElementById('lst').scrollTop = 0;
            }
        }
        function playVideo(id) { if (player && player.loadVideoById) { player.loadVideoById({ videoId: id }); document.getElementById('search-input').blur(); } }
    </script>
