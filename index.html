<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZEFRAM LST</title>
    <style>
        :root {
            --blue: #00f3ff;
            --black: #000000;
            --gray: #111111;
            --dark-gray: #8b8b8b;

            --bg: #000000;
            --panel: #050505;
            --line: #1f1f1f;
            --line-strong: #333333;
            --text: #f2f2f2;
            --muted: #8b8b8b;
            --accent: #00f3ff;
            --control-bg: #111111;
        }

        body.light-mode {
            --blue: #40a9ea;
            --black: #f3f5f7;
            --gray: #e6e9ed;
            --dark-gray: #8f959c;

            --bg: #f3f5f7;
            --panel: #f3f5f7;
            --line: #d8dde3;
            --line-strong: #c4cbd3;
            --text: #333333;
            --muted: #8f959c;
            --accent: #40a9ea;
            --control-bg: #e6e9ed;
        }
        html, body { height: 100%; margin: 0; background: var(--black); color: white; font-family: sans-serif; overflow: hidden; }
        
        /* 全体レイアウト：Flexで各エリアを完全に分離 */
        .main-container { width: 100%; height: 100vh; position: relative; overflow: hidden; background: var(--black); }
        .player-layout { display: grid; grid-template-columns: minmax(0, 1.35fr) minmax(0, 0.85fr); width: 100%; height: 100%; min-width: 0; min-height: 0; overflow: hidden; background: var(--black); }
        .left-player-column { display: grid; grid-template-rows: minmax(0, 1fr) 90px; min-width: 0; min-height: 0; overflow: hidden; background: #000; border-right: 1px solid #333; }
        .right-genre-column { display: grid; grid-template-rows: auto auto minmax(0, 1fr); width: 100%; max-width: 100%; min-width: 0; min-height: 0; overflow: hidden; background: var(--black); box-sizing: border-box; }
        
        /* 1. ビデオエリア */
        #video-container { width: 100%; height: 100%; min-height: 0; background: #000; flex-shrink: 0; border-bottom: 1px solid #333; position: relative; overflow: hidden; }
        #player { width: 100%; height: 100%; transform: scale(1.01); }

        /* 2. 再生コントロール */
        .player-controls { display: flex; align-items: center; height: 90px; padding: 0 20px; background: var(--black); gap: 20px; flex-shrink: 0; position: relative; z-index: 10; }
        #play-pause-btn { font-size: 2rem; color: var(--blue); cursor: pointer; user-select: none; width: 45px; text-align: center; }
        
        .seek-container { flex-grow: 1; position: relative; height: 100%; display: flex; align-items: center; }
        .seek-bar-wrapper { position: relative; width: 100%; height: 10px; background: #333; border-radius: 5px; cursor: pointer; touch-action: none; z-index: 15; }
        #seek-fill { position: absolute; left: 0; top: 0; height: 100%; background: rgba(0, 243, 255, 0.5); border-radius: 5px; pointer-events: none; }
        #seek-dot { position: absolute; top: 50%; width: 16px; height: 16px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 0 10px rgba(255,255,255,0.8); }
        
        .time-label { position: absolute; font-family: monospace; font-size: 0.75rem; color: var(--blue); letter-spacing: 1px; pointer-events: none; bottom: 12px; }
        #current-time { left: 0; }
        #total-time { right: 0; }

        /* 3. 検索エリア */
        .search-area { padding: 10px 0 10px 0; background: var(--black); flex-shrink: 0; border-bottom: 1px solid #222; display: flex; flex-direction: column; align-items: center; position: relative; z-index: 20; width: 100%; max-width: 100%; min-width: 0; box-sizing: border-box; overflow: hidden; }
        
        .rotary-container { width: 100%; max-width: 100%; min-width: 0; box-sizing: border-box; overflow-x: auto; overflow-y: hidden; display: flex; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; padding: 10px 0; scroll-behavior: smooth; }
        .rotary-container::-webkit-scrollbar { display: none; }
        .rotary-track { display: flex; align-items: center; padding-left: calc(50% - 90px); padding-right: calc(50% - 90px); min-width: max-content; }

        .mode-btn { 
            scroll-snap-align: center; flex-shrink: 0; width: 180px; font-size: 0.6rem; padding: 8px 0; margin: 0 10px;
            background: var(--gray); border: 1px solid #333; border-radius: 20px; color: #555; font-weight: bold;
            transition: 0.3s; white-space: nowrap; cursor: pointer; text-align: center;
        }
        .mode-btn.active { color: var(--blue); border-color: var(--blue); background: #111; text-shadow: 0 0 8px var(--blue); transform: scale(1.1); }

        .bottom-row { width: calc(100% - 28px); max-width: calc(100% - 28px); display: flex; gap: 10px; align-items: center; margin-top: 10px; min-width: 0; box-sizing: border-box; }
        #theme-trigger { cursor: pointer; font-size: 1.05rem; transition: 0.3s; color: var(--dark-gray); opacity: 0.7; flex-shrink: 0; width: 24px; text-align: center; }
        #theme-trigger.active { color: var(--blue); opacity: 1; }
        #key-trigger { cursor: pointer; font-size: 1.2rem; transition: 0.3s; color: var(--dark-gray); opacity: 0.6; flex-shrink: 0; }
        #key-trigger.active { color: var(--blue) !important; opacity: 1; text-shadow: 0 0 12px var(--blue); }

        .input-wrapper { flex: 1 1 auto; min-width: 0; position: relative; }
        #search-input { background: var(--gray); border: 1px solid #333; border-radius: 4px; font-size: 1rem; color: white; width: 100%; min-width: 0; max-width: 100%; padding: 10px; outline: none; box-sizing: border-box; }
        #search-btn { background: transparent; color: var(--blue); border: 1px solid var(--blue); padding: 0 12px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; cursor: pointer; height: 40px; line-height: 40px; flex-shrink: 0; }
        #status { position: absolute; left: 0; top: 100%; font-size: 0.55rem; color: #555; margin-top: 4px; letter-spacing: 1px; }

        /* 4. ナビゲーション固定エリア（揺れ防止のため独立） */
        .fixed-nav-container { 
            width: 100%; max-width: 100%; min-width: 0; height: 45px; flex-shrink: 0; background: var(--black); 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; border-bottom: 1px solid #111; box-sizing: border-box;
            transform: translateZ(0); /* GPUレイヤー固定 */
            overflow: hidden;
        }
        .nav-link { font-size: 0.85rem; font-weight: bold; color: var(--blue); cursor: pointer; letter-spacing: 1px; -webkit-font-smoothing: antialiased; }
        .nav-link:active { opacity: 0.5; }

        /* 5. スクロールリストエリア */
        #lst { width: 100%; max-width: 100%; min-width: 0; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; z-index: 5; background: var(--black); box-sizing: border-box; }
        .list-inner { width: 100%; max-width: 100%; min-width: 0; padding: 0 15px 50px 15px; box-sizing: border-box; }

        @media (max-width: 980px) {
            .main-container { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
            .player-layout { display: flex; flex-direction: column; height: 100vh; min-height: 0; overflow: hidden; }
            .left-player-column { display: flex; flex-direction: column; border-right: none; border-bottom: 1px solid #333; flex: 0 0 auto; min-height: 0; }
            #video-container { width: 100%; aspect-ratio: 16 / 9; height: auto; max-height: 35vh; flex-shrink: 0; }
            .player-controls { height: 90px; flex-shrink: 0; }
            .right-genre-column { display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; overflow: hidden; }
            .search-area { flex-shrink: 0; }
            .fixed-nav-container { flex-shrink: 0; }
            #lst { flex: 1 1 auto; min-height: 0; overflow-y: auto; }
        }

        /* 共通パーツ */
        #setup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; justify-content: center; align-items: center; }
        .z-panel { width: 85%; max-width: 360px; padding: 40px 20px; border: 1px solid var(--blue); background: var(--black); text-align: center; }
        .z-btn { background: transparent; color: var(--blue); border: 1px solid var(--blue); padding: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 0.75rem; margin-bottom: 20px; }
        .setup-input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: var(--blue); font-family: monospace; text-align: center; outline: none; box-sizing: border-box; }

        .section-label { font-size: 0.65rem; color: var(--blue); font-weight: bold; margin: 15px 0 10px; border-left: 2px solid var(--blue); padding-left: 8px; letter-spacing: 2px; }
        .row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #111; cursor: pointer; }
        .type-tag { width: 40px; font-size: 0.45rem; padding: 2px 0; background: #222; color: #888; border-radius: 2px; flex-shrink: 0; text-align: center; margin-right: 10px; }
        .thumb-box { width: 45px; height: 45px; flex-shrink: 0; margin-right: 12px; border-radius: 2px; overflow: hidden; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .title { flex-grow: 1; font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #ddd; }
        .duration { font-size: 0.7rem; color: #555; font-family: monospace; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="player-layout">
            <div class="left-player-column">
                <div id="video-container"><div id="player"></div></div>

                <div class="player-controls">
                    <div id="play-pause-btn" onclick="togglePlay()">II</div>
                    <div class="seek-container">
                        <div class="seek-bar-wrapper" id="seek-bar">
                            <div id="seek-fill"></div>
                            <div id="seek-dot"></div>
                        </div>
                        <span id="current-time" class="time-label">00:00</span>
                        <span id="total-time" class="time-label">00:00</span>
                    </div>
                </div>
            </div>

            <div class="right-genre-column">
                <div class="search-area">
                    <div class="rotary-container" id="rotary">
                        <div class="rotary-track" id="track">
                            <div class="mode-btn" data-val="Latin / Reggaeton" onclick="toggleGenre(this)">Latin / Reggaeton</div>
                            <div class="mode-btn" data-val="EDM / Dance" onclick="toggleGenre(this)">EDM / Dance</div>
                            <div class="mode-btn" data-val="Rock / Alternative" onclick="toggleGenre(this)">Rock / Alternative</div>
                            <div class="mode-btn" data-val="Country" onclick="toggleGenre(this)">Country</div>
                            <div class="mode-btn" data-val="Jazz / Smooth Jazz" onclick="toggleGenre(this)">Jazz / Smooth Jazz</div>
                            <div class="mode-btn" data-val="Jazzy Hip Hop / Chill Out" onclick="toggleGenre(this)">Jazzy Hip Hop / Chill Out</div>
                            <div id="m-music" class="mode-btn active" data-val="MUSIC" onclick="toggleGenre(this)">MUSIC</div>
                            <div class="mode-btn" data-val="MIX" onclick="toggleGenre(this)">MIX</div>
                            <div class="mode-btn" data-val="Lo-fi Hip Hop / Chillhop" onclick="toggleGenre(this)">Lo-fi Hip Hop / Chillhop</div>
                            <div class="mode-btn" data-val="Indie / Bedroom Pop" onclick="toggleGenre(this)">Indie / Bedroom Pop</div>
                            <div class="mode-btn" data-val="Hip Hop / Rap" onclick="toggleGenre(this)">Hip Hop / Rap</div>
                            <div class="mode-btn" data-val="Pop / Modern Pop" onclick="toggleGenre(this)">Pop / Modern Pop</div>
                            <div class="mode-btn" data-val="R&B / Soul" onclick="toggleGenre(this)">R&B / Soul</div>
                        </div>
                    </div>
                    <div class="bottom-row">
                        <div id="theme-trigger" onclick="togglePlayerTheme()">☀</div>
                        <div id="key-trigger" onclick="toggleSetup()">🔑</div>
                        <div class="input-wrapper">
                            <input type="text" id="search-input" placeholder="" onkeydown="if(event.key==='Enter') doSearch()">
                            <div id="status"></div>
                        </div>
                        <button id="search-btn" onclick="doSearch()">GO</button>
                    </div>
                </div>

                <div class="fixed-nav-container" id="fixed-nav" style="display:none;">
                    <div class="nav-link" onclick="restoreLastSearch()">ALBUM / BACK</div>
                    <div class="nav-link" onclick="doSearch(true)">↻ REFRESH</div>
                </div>

                <div id="lst">
                    <div class="list-inner" id="list-inner"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="setup-overlay">
        <div class="z-panel">
            <button class="z-btn" onclick="openGoogle()">OPEN TERMINAL</button>
            <input type="text" id="api-key-input" class="setup-input" placeholder="PASTE CORE KEY" oninput="checkKey()">
            <div onclick="toggleSetup()" style="margin-top:30px; font-size:0.6rem; color:#444; cursor:pointer;">[ CLOSE ]</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let API_KEY = localStorage.getItem('ZEFRAM_API_KEY');
        let player, lastResultsHTML = "";
        let timer, isDragging = false;
        let selectedGenres = [];
        let nextPageToken = "";
        let currentQuery = "";

        window.addEventListener('DOMContentLoaded', () => {
            applyPlayerTheme(localStorage.getItem('ZEFRAM_PLAYER_THEME') || 'dark');
            updateKeyStatus();
            initSeekBar();
            setTimeout(centerMusic, 150);
        });

        function applyPlayerTheme(theme) {
            const nextTheme = theme === 'light' ? 'light' : 'dark';
            document.body.classList.toggle('light-mode', nextTheme === 'light');
            localStorage.setItem('ZEFRAM_PLAYER_THEME', nextTheme);

            const trigger = document.getElementById('theme-trigger');
            if (trigger) {
                trigger.classList.toggle('active', nextTheme === 'light');
                trigger.innerText = nextTheme === 'light' ? '☾' : '☀';
            }
        }

        function togglePlayerTheme() {
            const isLight = document.body.classList.contains('light-mode');
            applyPlayerTheme(isLight ? 'dark' : 'light');
        }

        function centerMusic() {
            const rotary = document.getElementById('rotary');
            const musicBtn = document.getElementById('m-music');
            if (rotary && musicBtn) rotary.scrollLeft = musicBtn.offsetLeft - (rotary.offsetWidth / 2) + (musicBtn.offsetWidth / 2);
        }

        function updateKeyStatus() {
            const trigger = document.getElementById('key-trigger');
            if (API_KEY && API_KEY.trim().length > 0) trigger.classList.add('active');
            else trigger.classList.remove('active');
        }

        function toggleSetup() {
            const el = document.getElementById('setup-overlay');
            el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        }

        function openGoogle() { window.open('https://console.cloud.google.com/apis/credentials', 'z_terminal', 'width=700,height=800'); }

        async function checkKey() {
            const val = document.getElementById('api-key-input').value.trim();
            if (val.length < 30) return;
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/videoCategories?part=snippet&regionCode=JP&key=${val}`);
                if (res.ok) {
                    localStorage.setItem('ZEFRAM_API_KEY', val);
                    API_KEY = val;
                    updateKeyStatus();
                    toggleSetup();
                }
            } catch (e) { console.error("Key verification failed"); }
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'playsinline': 1, 'controls': 0, 'rel': 0, 'modestbranding': 1, 'showinfo': 0, 'iv_load_policy': 3, 'disablekb': 1 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                document.getElementById('play-pause-btn').innerText = "II";
                startTimer();
            } else {
                document.getElementById('play-pause-btn').innerText = "▶";
                stopTimer();
            }
        }

        function togglePlay() {
            if (!player || !player.getPlayerState) return;
            const state = player.getPlayerState();
            if (state == YT.PlayerState.PLAYING) player.pauseVideo();
            else player.playVideo();
        }

        function startTimer() { stopTimer(); timer = setInterval(updateUI, 300); }
        function stopTimer() { clearInterval(timer); }

        function updateUI() {
            if (!player || !player.getCurrentTime || isDragging) return;
            const cur = player.getCurrentTime();
            const dur = player.getDuration();
            updateBar(cur / dur);
            document.getElementById('current-time').innerText = formatTime(cur);
            document.getElementById('total-time').innerText = formatTime(dur);
        }

        function updateBar(perc) {
            const p = Math.max(0, Math.min(1, perc)) * 100;
            document.getElementById('seek-fill').style.width = p + "%";
            document.getElementById('seek-dot').style.left = p + "%";
        }

        function initSeekBar() {
            const bar = document.getElementById('seek-bar');
            const handleMove = (e) => {
                if (!isDragging || !player || !player.getDuration) return;
                const rect = bar.getBoundingClientRect();
                const clientX = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
                const pos = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                updateBar(pos);
                document.getElementById('current-time').innerText = formatTime(pos * player.getDuration());
            };
            const handleEnd = (e) => {
                if (!isDragging) return;
                isDragging = false;
                const rect = bar.getBoundingClientRect();
                const clientX = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientX : e.clientX;
                const pos = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                player.seekTo(pos * player.getDuration());
            };
            bar.addEventListener('mousedown', (e) => { isDragging = true; handleMove(e); });
            bar.addEventListener('touchstart', (e) => { isDragging = true; handleMove(e); }, {passive: false});
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', handleMove, {passive: false});
            window.addEventListener('mouseup', handleEnd);
            window.addEventListener('touchend', handleEnd);
        }

        function formatTime(s) {
            if (!s || isNaN(s)) return "00:00";
            const m = Math.floor(s / 60), rs = Math.floor(s % 60);
            return m.toString().padStart(2, '0') + ":" + rs.toString().padStart(2, '0');
        }

        function toggleGenre(el) {
            const val = el.getAttribute('data-val');
            if (val === 'MUSIC') {
                selectedGenres = [];
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
            } else {
                document.getElementById('m-music').classList.remove('active');
                if (el.classList.contains('active')) {
                    el.classList.remove('active');
                    selectedGenres = selectedGenres.filter(g => g !== val);
                } else {
                    el.classList.add('active');
                    selectedGenres.push(val);
                }
                if (selectedGenres.length === 0) document.getElementById('m-music').classList.add('active');
            }
            document.getElementById('search-input').value = selectedGenres.join(' ');
        }

        async function doSearch(isNext = false) {
            if (!API_KEY) return toggleSetup();
            const q = document.getElementById('search-input').value;
            if (!q && selectedGenres.length === 0) return;
            if (!isNext) { nextPageToken = ""; currentQuery = q; }
            document.getElementById('status').innerText = isNext ? "LOADING NEXT..." : "SEARCHING...";
            try {
                let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(currentQuery + " - Topic")}&maxResults=50&key=${API_KEY}`;
                if (isNext && nextPageToken) url += `&pageToken=${nextPageToken}`;
                const res = await fetch(url);
                const data = await res.json();
                nextPageToken = data.nextPageToken || "";
                const videoIds = data.items.filter(i => i.id.kind === 'youtube#video').map(i => i.id.videoId).join(',');
                let durationMap = {};
                if (videoIds) {
                    const dRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${videoIds}&key=${API_KEY}`);
                    const dData = await dRes.json();
                    dData.items.forEach(i => { durationMap[i.id] = parseDuration(i.contentDetails.duration); });
                }
                renderList(data.items, durationMap);
                document.getElementById('status').innerText = "";
            } catch (e) { document.getElementById('status').innerText = "ERROR"; }
        }

        function renderList(items, durationMap) {
            const inner = document.getElementById('list-inner');
            const nav = document.getElementById('fixed-nav');
            let html = "";
            nav.style.display = 'flex';
            const playlists = items.filter(i => i.id.kind === 'youtube#playlist');
            if (playlists.length > 0) {
                html += '<div class="section-label">ALBUMS</div>';
                html += playlists.map(i => `<div class="row" onclick="loadAlbum('${i.id.playlistId}', '${i.snippet.title}')"><span class="type-tag">ALBUM</span><div class="thumb-box"><img src="${i.snippet.thumbnails.default.url}"></div><div class="title">${i.snippet.title.replace(/ - Topic$/, "")}</div><div class="duration">--:--</div></div>`).join('');
            }
            const videos = items.filter(i => i.id.kind === 'youtube#video');
            if (videos.length > 0) {
                html += '<div class="section-label">VIDEOS</div>';
                html += videos.map(i => `<div class="row" onclick="playVideo('${i.id.videoId}')"><span class="type-tag">SONG</span><div class="thumb-box"><img src="${i.snippet.thumbnails.default.url}"></div><div class="title">${i.snippet.title.replace(/ - Topic$/, "")}</div><div class="duration">${durationMap[i.id.videoId] || "--:--"}</div></div>`).join('');
            }
            inner.innerHTML = html;
            lastResultsHTML = html;
            document.getElementById('lst').scrollTop = 0;
        }

        async function loadAlbum(playlistId, title) {
            document.getElementById('status').innerText = "LOADING...";
            const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&key=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            const videoIds = data.items.map(i => i.snippet.resourceId.videoId).join(',');
            const dRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${videoIds}&key=${API_KEY}`);
            const dData = await dRes.json();
            let durationMap = {};
            dData.items.forEach(i => { durationMap[i.id] = parseDuration(i.contentDetails.duration); });
            let html = `<div class="section-label">${title.replace(/ - Topic$/, "")}</div>`;
            html += data.items.map(i => `<div class="row" onclick="playVideo('${i.snippet.resourceId.videoId}')"><span class="type-tag">SONG</span><div class="thumb-box"><img src="${i.snippet.thumbnails.default.url}"></div><div class="title">${i.snippet.title}</div><div class="duration">${durationMap[i.snippet.resourceId.videoId] || "--:--"}</div></div>`).join('');
            document.getElementById('list-inner').innerHTML = html;
            document.getElementById('status').innerText = "";
            document.getElementById('lst').scrollTop = 0;
        }

        function parseDuration(pt) {
            const m = pt.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            if (!m) return "--:--";
            const h = m[1] ? parseInt(m[1]) : 0, min = m[2] ? parseInt(m[2]) : 0, sec = m[3] ? parseInt(m[3]) : 0;
            const res = [];
            if (h > 0) res.push(h);
            res.push(h > 0 ? min.toString().padStart(2, '0') : min);
            res.push(sec.toString().padStart(2, '0'));
            return res.join(':');
        }

        function restoreLastSearch() { 
            if(lastResultsHTML) {
                document.getElementById('list-inner').innerHTML = lastResultsHTML;
                document.getElementById('lst').scrollTop = 0;
            }
        }
        function playVideo(id) { if (player && player.loadVideoById) { player.loadVideoById({ videoId: id }); document.getElementById('search-input').blur(); } }
    </script>
</body>
</html>
